<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">AI Konsultantka – Salon Beauty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c9907a;
    --primary-dark: #a8705c;
    --primary-light: #f0ddd6;
    --bg: #faf7f2;
    --text: #2a2320;
    --muted: #8a7d78;
    --white: #ffffff;
    --border: #e8e0da;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── FLOATING BUTTON ── */
  #chatToggle {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(168,112,92,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 9999;
  }
  #chatToggle:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(168,112,92,0.55); }

  .notif-dot {
    position: absolute;
    top: 4px; right: 4px;
    width: 12px; height: 12px;
    background: #e05c5c;
    border-radius: 50%;
    border: 2px solid white;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.7} }

  /* ── CHAT WIDGET ── */
  #chatWidget {
    position: fixed;
    bottom: 96px; right: 24px;
    width: 370px;
    max-height: 580px;
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 16px 60px rgba(42,35,32,0.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: scale(0.92) translateY(16px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
  }
  #chatWidget.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── HEADER ── */
  .wg-header {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    flex-shrink: 0;
  }
  .wg-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .wg-info { flex:1; }
  .wg-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight:600; color:white; }
  .wg-sub { font-size: 11px; color: rgba(255,255,255,0.75); }
  .wg-close {
    background: rgba(255,255,255,0.15);
    border: none; cursor: pointer;
    border-radius: 50%; width: 28px; height: 28px;
    color: white; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .wg-close:hover { background: rgba(255,255,255,0.3); }

  /* ── MESSAGES ── */
  .wg-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #fdfcfb;
    min-height: 200px;
  }
  .wg-messages::-webkit-scrollbar { width: 3px; }
  .wg-messages::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

  .msg { display:flex; gap:8px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .msg.user { flex-direction: row-reverse; }

  .msg-av {
    width: 28px; height: 28px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; flex-shrink:0; margin-top:2px;
  }
  .msg.bot .msg-av { background: var(--primary-light); }
  .msg.user .msg-av { background: var(--text); color: white; font-size:10px; }

  .msg-b {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .msg.bot .msg-b {
    background: white;
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(42,35,32,0.06);
  }
  .msg.user .msg-b {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border-bottom-right-radius: 4px;
  }

  .typing-b { display:flex; align-items:center; gap:4px; padding: 12px 16px; }
  .typing-b span { width:6px; height:6px; background: var(--muted); border-radius:50%; animation: bounce 1.2s infinite; }
  .typing-b span:nth-child(2){animation-delay:.2s}
  .typing-b span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── QUICK REPLIES ── */
  .wg-quick {
    padding: 0 12px 10px;
    display: flex; flex-wrap: wrap; gap: 6px;
    background: white;
  }
  .qr {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 6px 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qr:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  /* ── CONSENT (RODO) ── */
  .wg-consent {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    background: #fffbf8;
    display: none;
  }
  .wg-consent p { font-size: 11.5px; color: var(--muted); line-height: 1.55; margin-bottom: 8px; }
  .wg-consent label { display:flex; gap:8px; align-items:flex-start; cursor:pointer; }
  .wg-consent input[type=checkbox] { margin-top:2px; accent-color: var(--primary); flex-shrink:0; }
  .wg-consent span { font-size: 11.5px; color: var(--text); line-height: 1.5; }
  .wg-consent a { color: var(--primary); }
  #consentBtn {
    margin-top: 10px;
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
