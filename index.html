<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="pageTitle">AI Konsultantka – Salon Beauty</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #c9907a;
    --primary-dark: #a8705c;
    --primary-light: #f0ddd6;
    --bg: #faf7f2;
    --text: #2a2320;
    --muted: #8a7d78;
    --white: #ffffff;
    --border: #e8e0da;
  }
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    min-height: 100vh;
    padding: 24px;
  }

  /* ── FLOATING BUTTON ── */
  #chatToggle {
    position: fixed;
    bottom: 24px; right: 24px;
    width: 60px; height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(168,112,92,0.45);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    transition: transform 0.2s, box-shadow 0.2s;
    z-index: 9999;
  }
  #chatToggle:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(168,112,92,0.55); }

  .notif-dot {
    position: absolute;
    top: 4px; right: 4px;
    width: 12px; height: 12px;
    background: #e05c5c;
    border-radius: 50%;
    border: 2px solid white;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.7} }

  /* ── CHAT WIDGET ── */
  #chatWidget {
    position: fixed;
    bottom: 96px; right: 24px;
    width: 370px;
    max-height: 580px;
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 16px 60px rgba(42,35,32,0.18);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: scale(0.92) translateY(16px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.2s;
  }
  #chatWidget.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── HEADER ── */
  .wg-header {
    padding: 16px 18px;
    display: flex; align-items: center; gap: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    flex-shrink: 0;
  }
  .wg-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .wg-info { flex:1; }
  .wg-name { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight:600; color:white; }
  .wg-sub { font-size: 11px; color: rgba(255,255,255,0.75); }
  .wg-close {
    background: rgba(255,255,255,0.15);
    border: none; cursor: pointer;
    border-radius: 50%; width: 28px; height: 28px;
    color: white; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .wg-close:hover { background: rgba(255,255,255,0.3); }

  /* ── MESSAGES ── */
  .wg-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #fdfcfb;
    min-height: 200px;
  }
  .wg-messages::-webkit-scrollbar { width: 3px; }
  .wg-messages::-webkit-scrollbar-thumb { background: var(--primary-light); border-radius: 3px; }

  .msg { display:flex; gap:8px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .msg.user { flex-direction: row-reverse; }

  .msg-av {
    width: 28px; height: 28px;
    border-radius: 50%;
    display:flex; align-items:center; justify-content:center;
    font-size: 12px; flex-shrink:0; margin-top:2px;
  }
  .msg.bot .msg-av { background: var(--primary-light); }
  .msg.user .msg-av { background: var(--text); color: white; font-size:10px; }

  .msg-b {
    max-width: 82%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 13.5px;
    line-height: 1.6;
  }
  .msg.bot .msg-b {
    background: white;
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
    box-shadow: 0 1px 4px rgba(42,35,32,0.06);
  }
  .msg.user .msg-b {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border-bottom-right-radius: 4px;
  }

  .typing-b { display:flex; align-items:center; gap:4px; padding: 12px 16px; }
  .typing-b span { width:6px; height:6px; background: var(--muted); border-radius:50%; animation: bounce 1.2s infinite; }
  .typing-b span:nth-child(2){animation-delay:.2s}
  .typing-b span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* ── QUICK REPLIES ── */
  .wg-quick {
    padding: 0 12px 10px;
    display: flex; flex-wrap: wrap; gap: 6px;
    background: white;
  }
  .qr {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 100px;
    padding: 6px 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .qr:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

  /* ── CONSENT (RODO) ── */
  .wg-consent {
    padding: 12px 14px;
    border-top: 1px solid var(--border);
    background: #fffbf8;
    display: none;
  }
  .wg-consent p { font-size: 11.5px; color: var(--muted); line-height: 1.55; margin-bottom: 8px; }
  .wg-consent label { display:flex; gap:8px; align-items:flex-start; cursor:pointer; }
  .wg-consent input[type=checkbox] { margin-top:2px; accent-color: var(--primary); flex-shrink:0; }
  .wg-consent span { font-size: 11.5px; color: var(--text); line-height: 1.5; }
  .wg-consent a { color: var(--primary); }
  #consentBtn {
    margin-top: 10px;
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 10px;
    padding: 9px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    opacity: 0.4;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #consentBtn.active { opacity:1; pointer-events:all; }

  /* ── INPUT ── */
  .wg-input {
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-end;
    background: white; flex-shrink: 0;
  }
  #wgTextarea {
    flex:1;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 9px 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    resize: none;
    min-height: 40px;
    max-height: 100px;
    transition: border-color 0.2s;
  }
  #wgTextarea:focus { border-color: var(--primary); }
  #wgTextarea::placeholder { color: var(--muted); }
  #wgSend {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    border: none; cursor: pointer;
    display:flex; align-items:center; justify-content:center;
    transition: opacity 0.2s, transform 0.15s;
    flex-shrink:0;
  }
  #wgSend:hover { opacity:0.85; transform:scale(1.05); }
  #wgSend:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
  #wgSend svg { fill: white; }

  /* ── DEMO NOTICE (usunąć w produkcji) ── */
  .demo-notice {
    background: #fffbec;
    border-bottom: 1px solid #f0e0a0;
    padding: 8px 14px;
    font-size: 11px;
    color: #8a7020;
    text-align: center;
    flex-shrink: 0;
  }

  @media (max-width: 420px) {
    #chatWidget { width: calc(100vw - 24px); right: 12px; bottom: 84px; }
    #chatToggle { right: 12px; bottom: 12px; }
  }
</style>
</head>

<script>
// ── Aplikuj konfigurację do CSS variables i DOM ───────────────────────────
(function applyConfig() {
  const C = SALON_CONFIG;
  document.documentElement.style.setProperty('--primary', C.colorPrimary);
  document.documentElement.style.setProperty('--primary-dark', C.colorDark);
  // przybliżony jasny odcień
  document.documentElement.style.setProperty('--primary-light', C.colorPrimary + '22');

  document.getElementById('pageTitle').textContent = `AI Konsultantka – ${C.name}`;
  document.getElementById('headerEmoji').textContent = C.botEmoji;
  document.getElementById('toggleEmoji').textContent = C.botEmoji;
  document.getElementById('headerName').textContent = `${C.botName} – ${C.name}`;
  document.getElementById('consentSalonName').textContent = C.name;
  document.getElementById('consentPrivacyLink').href = C.privacyUrl;

  // Buduj system prompt z konfiguracji
  const serviceList = C.services.map(s =>
    `• ${s.name} – ${s.price} zł, ${s.duration}: ${s.description}`
  ).join('\n');

  window.SYSTEM_PROMPT = `Jesteś ${C.botName} – serdeczną, profesjonalną konsultantką AI salonu "${C.name}" w ${C.city}.

OFERTA SALONU:
${serviceList}

DODATKOWE INFORMACJE:
${C.extraInfo}

DANE KONTAKTOWE SALONU:
Tel: ${C.phone} | E-mail: ${C.email} | Adres: ${C.address}, ${C.city}

STYL ROZMOWY:
- Ciepła, kobieca, empatyczna – jak dobra przyjaciółka ze znajomością beauty
- Krótkie odpowiedzi (2–4 zdania), pytaj o jeden aspekt na raz
- Używaj emoji subtelnie (max 1–2 na wiadomość)
- Mów po polsku

TWÓJ CEL (po kolei):
1. Poznaj potrzebę klientki (co jej przeszkadza / czego szuka)
2. Dopytaj o typ skóry lub konkretny problem
3. Zaproponuj 1–2 zabiegi z oferty z uzasadnieniem
4. Gdy klientka jest zainteresowana – napisz: "Chętnie umówię Cię na wizytę! [COLLECT_CONTACT]"
5. Po zebraniu danych zakończ: "Świetnie! Twoje dane przekazuję do salonu – odezwiemy się wkrótce 🌸"

WAŻNE: Nigdy nie wymyślaj zabiegów spoza oferty. Nie dawaj porad medycznych. Gdy chcesz zebrać kontakt, użyj dokładnie tokena [COLLECT_CONTACT].`;
})();

// ── State ─────────────────────────────────────────────────────────────────
let history = [];
let isLoading = false;
let consentGiven = false;
let waitingForContact = false;

// ── DOM refs ──────────────────────────────────────────────────────────────
const widget    = document.getElementById('chatWidget');
const toggle    = document.getElementById('chatToggle');
const closeBtn  = document.getElementById('chatClose');
const messages  = document.getElementById('wgMessages');
const quick     = document.getElementById('wgQuick');
const textarea  = document.getElementById('wgTextarea');
const sendBtn   = document.getElementById('wgSend');
const consent   = document.getElementById('wgConsent');
const consentCk = document.getElementById('consentCheck');
const consentBt = document.getElementById('consentBtn');
const notifDot  = document.getElementById('notifDot');

// ── Toggle widget ─────────────────────────────────────────────────────────
toggle.addEventListener('click', () => {
  const isOpen = widget.classList.toggle('open');
  toggle.setAttribute('aria-expanded', isOpen);
  notifDot.style.display = 'none';
  if (isOpen && history.length === 0) startChat();
});
closeBtn.addEventListener('click', () => { widget.classList.remove('open'); toggle.setAttribute('aria-expanded', false); });

// ── Consent checkbox ──────────────────────────────────────────────────────
consentCk.addEventListener('change', () => {
  consentBt.classList.toggle('active', consentCk.checked);
});
consentBt.addEventListener('click', () => {
  if (!consentCk.checked) return;
  consentGiven = true;
  consent.style.display = 'none';
  waitingForContact = true;
  addMsg('bot', `Dziękuję! Podaj mi teraz swoje imię i numer telefonu, a przekażę je do salonu ${SALON_CONFIG.name} 🌸`);
  enableInput("Np. Anna, 600 123 456");
});

// ── Messages ──────────────────────────────────────────────────────────────
function addMsg(role, text) {
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const av = document.createElement('div');
  av.className = 'msg-av';
  av.textContent = role === 'bot' ? SALON_CONFIG.botEmoji : 'Ty';
  const bubble = document.createElement('div');
  bubble.className = 'msg-b';
  bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\[COLLECT_CONTACT\]/g, '');
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="msg-av">${SALON_CONFIG.botEmoji}</div><div class="msg-b typing-b"><span></span><span></span><span></span></div>`;
  messages.appendChild(wrap);
  messages.scrollTop = messages.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if(t) t.remove(); }

function setQuickReplies(options) {
  quick.innerHTML = '';
  if (!options?.length) { quick.style.display='none'; return; }
  quick.style.display = 'flex';
  options.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'qr'; btn.textContent = o;
    btn.addEventListener('click', () => { quick.style.display='none'; send(o); });
    quick.appendChild(btn);
  });
}

function enableInput(placeholder = "Napisz wiadomość...") {
  textarea.placeholder = placeholder;
  textarea.disabled = false;
  sendBtn.disabled = false;
  textarea.focus();
}

// ── Gemini API call ───────────────────────────────────────────────────────
async function callGemini(msgs) {
  const C = SALON_CONFIG;
  const url = C.proxyUrl
    ? C.proxyUrl           // produkcja – proxy Workers
    : `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${C.geminiKeyDev}`;

  const body = {
    system_instruction: { parts: [{ text: window.SYSTEM_PROMPT }] },
    contents: msgs.map(m => ({
      role: m.role === 'assistant' ? 'model' : 'user',
      parts: [{ text: m.content }]
    })),
    generationConfig: { temperature: 0.75, maxOutputTokens: 350 }
  };

  // Przy proxy wysyłamy inaczej (bez systemu w URL, bo proxy to obsługuje)
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(C.proxyUrl ? body : body)
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || 'Błąd API');
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '(brak odpowiedzi)';
}

// ── Send message ──────────────────────────────────────────────────────────
async function send(text) {
  if (isLoading || !text.trim()) return;
  isLoading = true;
  sendBtn.disabled = true;
  quick.style.display = 'none';

  addMsg('user', text);
  history.push({ role: 'user', content: text });

  // Jeśli czekamy na dane kontaktowe – nie wysyłamy do AI, od razu kwitujemy
  if (waitingForContact) {
    waitingForContact = false;
    await new Promise(r => setTimeout(r, 600));
    addMsg('bot', `Doskonale! Twoje dane zostały przekazane do salonu ${SALON_CONFIG.name}. Odezwiemy się wkrótce – do zobaczenia! 🌸`);
    isLoading = false;
    sendBtn.disabled = false;
    textarea.value = '';
    return;
  }

  showTyping();
  try {
    let reply = await callGemini(history);
    removeTyping();

    // Sprawdź czy bot chce zebrać kontakt
    if (reply.includes('[COLLECT_CONTACT]')) {
      reply = reply.replace('[COLLECT_CONTACT]', '');
      addMsg('bot', reply.trim());
      history.push({ role: 'assistant', content: reply });
      // Pokaż sekcję zgody RODO
      if (!consentGiven) {
        consent.style.display = 'block';
        textarea.disabled = true;
        sendBtn.disabled = true;
      }
    } else {
      addMsg('bot', reply);
      history.push({ role: 'assistant', content: reply });

      // Inteligentne quick replies
      const low = reply.toLowerCase();
      if (low.includes('typ sk') || low.includes('cera')) {
        setQuickReplies(['Cera tłusta / mieszana','Cera sucha / wrażliwa','Cera normalna','Nie wiem 🤷‍♀️']);
      } else if (low.includes('problem') || low.includes('przeszkadza')) {
        setQuickReplies(['Niedoskonałości i pory','Zmarszczki','Szary wygląd','Relaks i odprężenie']);
      } else if (low.includes('termin') || low.includes('umów') || low.includes('wizyt')) {
        setQuickReplies(['Jak najszybciej','W tym tygodniu','Za 2 tygodnie']);
      }
    }
  } catch(err) {
    removeTyping();
    addMsg('bot', `Przepraszam, wystąpił problem z połączeniem. Zadzwoń do nas: ${SALON_CONFIG.phone} 📞`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  textarea.value = '';
  textarea.style.height = 'auto';
}

// ── Start chat ────────────────────────────────────────────────────────────
async function startChat() {
  showTyping();
  isLoading = true;
  try {
    const greeting = await callGemini([{ role:'user', content:'Przywitaj się krótko i zapytaj czego szukam' }]);
    removeTyping();
    addMsg('bot', greeting);
    history.push({ role:'user', content:'Przywitaj się krótko i zapytaj czego szukam' });
    history.push({ role:'assistant', content: greeting });
    setQuickReplies(['Zabieg na twarz','Manicure / pedicure','Chcę się odprężyć','Co polecacie?']);
    enableInput();
  } catch(e) {
    removeTyping();
    addMsg('bot', 'Hej! Mam chwilowy problem techniczny. Napisz do nas bezpośrednio 🌸');
    enableInput();
  }
  isLoading = false;
}

// ── Input events ──────────────────────────────────────────────────────────
sendBtn.addEventListener('click', () => send(textarea.value.trim()));
textarea.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(textarea.value.trim()); }
});
textarea.addEventListener('input', () => {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
});

// Pokaż powiadomienie po 3 sekundach jeśli widget zamknięty
setTimeout(() => {
  if (!widget.classList.contains('open')) notifDot.style.display = 'block';
}, 3000);
</script>
